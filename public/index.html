<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>단축키 빌더 + 메모장</title>
<style>
:root {
  --bg:#181b2e; --surface:#20233a; --card:#252943; --border:#2e3254;
  --text:#dde1f5; --muted:#7880a8; --accent:#7c6af7; --accent-s:#5548c8;
  --accent-g:rgba(124,106,247,.15); --ok:#5cc8b0; --warn:#f5a86a; --del:#f07070;
  --radius:14px; --radius-s:9px; --mono:'Cascadia Code','Consolas',monospace;
  --sans:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
  --shadow:0 4px 24px rgba(0,0,0,.35); --tr:.2s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;}
::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;}
.lock-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;width:340px;box-shadow:var(--shadow);text-align:center;}
.lock-box .lock-icon{font-size:40px;margin-bottom:12px;}
.lock-box h2{margin:0 0 6px;font-size:18px;}
.lock-box input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-s);color:var(--text);font-family:var(--sans);font-size:15px;padding:11px 14px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:12px;transition:border-color var(--tr),box-shadow var(--tr);}
.lock-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g);}
.lock-error{color:var(--del);font-size:12px;margin-bottom:10px;min-height:16px;}
.app{max-width:1060px;margin:0 auto;padding:28px 18px 60px;}
.header{display:flex;align-items:center;gap:14px;margin-bottom:26px;}
.logo{width:40px;height:40px;background:var(--accent);border-radius:12px;display:grid;place-items:center;font-size:20px;flex-shrink:0;box-shadow:0 0 20px rgba(124,106,247,.4);}
.header h1{margin:0;font-size:18px;font-weight:700;}
.header p{margin:2px 0 0;color:var(--muted);font-size:12px;}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.tab-bar{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px;margin-bottom:20px;width:fit-content;}
.tab-btn{padding:9px 22px;border:none;border-radius:var(--radius-s);background:transparent;color:var(--muted);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:var(--tr);}
.tab-btn:hover{color:var(--text);background:var(--accent-g);}
.tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(124,106,247,.4);}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:0 0 12px;}
input[type=text],input[type=password],textarea,select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-s);color:var(--text);font-family:var(--sans);font-size:13px;padding:10px 12px;outline:none;transition:border-color var(--tr),box-shadow var(--tr);}
input[type=text]:focus,input[type=password]:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g);}
textarea{resize:vertical;min-height:120px;line-height:1.6;}
select{cursor:pointer;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-s);border:1.5px solid var(--border);background:var(--card);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:var(--tr);white-space:nowrap;}
.btn:hover{border-color:var(--accent);background:var(--accent-g);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.btn-primary:hover{background:var(--accent-s);border-color:var(--accent-s);}
.btn-ok{background:var(--ok);border-color:var(--ok);color:#0d1f1a;font-weight:700;}
.btn-ok:hover{filter:brightness(1.1);}
.btn-danger{color:var(--del);}
.btn-danger:hover{border-color:var(--del);background:rgba(240,112,112,.1);}
.btn-sm{padding:6px 12px;font-size:12px;}
.builder-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:780px){.builder-grid{grid-template-columns:1fr;}}
.add-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.item-list{list-style:none;margin:14px 0 0;padding:0;max-height:300px;overflow-y:auto;}
.item-list li{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--radius-s);margin-bottom:4px;background:var(--card);border:1px solid var(--border);transition:border-color var(--tr);}
.item-list li:hover{border-color:var(--accent);}
.item-info .name{font-weight:600;font-size:13px;} .item-info .url{font-size:11px;color:var(--muted);margin-top:2px;word-break:break-all;}
.empty-msg{text-align:center;color:var(--muted);font-size:12px;padding:24px;}
.preview-label{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.dots span{width:9px;height:9px;border-radius:50%;display:inline-block;}
.dots .r{background:#f97575;} .dots .y{background:#f9c75a;} .dots .g{background:#5cf990;}
pre.code-preview{background:#111423;border:1.5px solid var(--border);border-radius:var(--radius-s);padding:16px;font-family:var(--mono);font-size:12px;line-height:1.65;color:#a5b4fc;max-height:300px;overflow:auto;white-space:pre-wrap;word-break:break-all;margin:0;}
.builder-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.builder-note{color:var(--muted);font-size:11.5px;line-height:1.6;margin-top:12px;}
.badge{display:inline-flex;align-items:center;background:var(--accent-g);border:1px solid var(--accent);color:var(--accent);border-radius:99px;font-size:10px;font-weight:700;padding:1px 8px;margin-left:6px;}
.memo-layout{display:grid;grid-template-columns:220px 1fr;gap:16px;min-height:540px;}
@media(max-width:680px){.memo-layout{grid-template-columns:1fr;}}
.memo-sidebar{display:flex;flex-direction:column;gap:10px;}
.memo-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;max-height:460px;}
.memo-item{padding:10px 12px;border-radius:var(--radius-s);background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:var(--tr);}
.memo-item:hover{border-color:var(--accent);}
.memo-item.selected{border-color:var(--accent);background:var(--accent-g);}
.memo-item .m-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;}
.memo-item .m-preview{font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;}
.memo-item .m-date{font-size:10px;color:var(--muted);margin-top:4px;}
.memo-editor{display:flex;flex-direction:column;gap:10px;}
.memo-title-input{font-size:16px!important;font-weight:600!important;}
.memo-body{flex:1;min-height:380px;font-size:14px!important;line-height:1.7!important;}
.memo-editor-actions{display:flex;justify-content:space-between;align-items:center;}
.memo-status{font-size:11px;color:var(--ok);}
.memo-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:8px;font-size:13px;}
.memo-empty .big{font-size:38px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity var(--tr);}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:320px;box-shadow:var(--shadow);}
.modal h3{margin:0 0 16px;font-size:15px;}
.modal input{margin-bottom:10px;}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
.modal-actions .btn{flex:1;justify-content:center;}
.modal-error{color:var(--del);font-size:12px;margin-bottom:8px;min-height:16px;}
.toast{position:fixed;bottom:28px;right:28px;background:var(--surface);border:1.5px solid var(--accent);color:var(--text);padding:11px 18px;border-radius:var(--radius-s);font-size:13px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;pointer-events:none;z-index:100;}
.toast.show{opacity:1;transform:translateY(0);}
.sync{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.sync.ok{color:var(--ok);} .sync.err{color:var(--del);}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <h2>비밀번호를 입력하세요</h2>
    <input type="password" id="pwInput" placeholder="비밀번호" maxlength="20">
    <div class="lock-error" id="lockError"></div>
    <button class="btn btn-primary" id="btnLogin" style="width:100%;justify-content:center">입장</button>
    <div style="margin-top:14px;">
      <button class="btn btn-sm" id="btnRemoveLock" style="width:100%;justify-content:center">🔓 비밀번호 해제</button>
    </div>
  </div>
</div>

<!-- CHANGE PASSWORD MODAL -->
<div class="modal-overlay" id="changePwModal">
  <div class="modal">
    <h3>🔑 비밀번호 변경</h3>
    <div class="section-label">현재 비밀번호</div>
    <input type="password" id="oldPw" placeholder="현재 비밀번호">
    <div class="section-label">새 비밀번호</div>
    <input type="password" id="newPw" placeholder="새 비밀번호">
    <div class="section-label">새 비밀번호 확인</div>
    <input type="password" id="newPw2" placeholder="새 비밀번호 확인">
    <div class="modal-error" id="pwModalError"></div>
    <div class="modal-actions">
      <button class="btn" id="btnCloseModal">취소</button>
      <button class="btn btn-primary" id="btnChangePassword">변경</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appMain" style="display:none">
  <div class="header">
    <div class="logo">🔗</div>
    <div>
      <h1>단축키 빌더 &amp; 메모장</h1>
      <p>바탕화면 바로가기 스크립트 생성 · 자유 메모장 · Firebase 동기화</p>
    </div>
    <div class="header-right">
      <span class="sync" id="syncStatus">⏳ 연결 중...</span>
      <button class="btn btn-sm" id="btnOpenModal">🔑 비번 변경</button>
      <button class="btn btn-sm" id="btnLogout">나가기</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="script">🔗 스크립트 빌더</button>
    <button class="tab-btn" data-tab="memo">📝 메모장</button>
  </div>

  <!-- SCRIPT BUILDER -->
  <div id="tab-script">
    <div class="builder-grid">
      <div class="panel">
        <div class="section-label">바로가기 추가</div>
        <div class="add-row">
          <select id="urlPreset" style="flex:1;min-width:140px;">
            <option value="">-- 자주 쓰는 사이트 --</option>
            <option value="ChatGPT|https://chat.openai.com">ChatGPT</option>
            <option value="Claude|https://claude.ai">Claude</option>
            <option value="유튜브|https://youtube.com">유튜브</option>
            <option value="구글|https://google.com">구글</option>
            <option value="네이버|https://naver.com">네이버</option>
            <option value="카카오톡 웹|https://web.kakao.com">카카오톡 웹</option>
            <option value="Gmail|https://mail.google.com">Gmail</option>
            <option value="GitHub|https://github.com">GitHub</option>
            <option value="Notion|https://notion.so">Notion</option>
          </select>
        </div>
        <div class="add-row">
          <input type="text" id="nameInput" placeholder="이름 (예: 챗지피티)" style="flex:1;min-width:120px;">
          <input type="text" id="urlInput" placeholder="https://..." style="flex:1.4;min-width:160px;">
          <button class="btn btn-primary" id="btnAddItem">+</button>
        </div>
        <div class="section-label" style="margin-top:18px;">목록 <span class="badge" id="countBadge">0</span></div>
        <ul class="item-list" id="itemList"><div class="empty-msg">아직 항목이 없어요 :)</div></ul>
      </div>
      <div class="panel">
        <div class="preview-label">
          <div class="dots"><span class="r"></span><span class="y"></span><span class="g"></span></div>
          <div class="section-label" style="margin:0">스크립트 미리보기</div>
        </div>
        <pre class="code-preview" id="preview">@echo off
:: 항목을 추가하면 여기에 스크립트가 표시됩니다.</pre>
        <div class="builder-actions">
          <button class="btn btn-ok" style="flex:1" id="btnDownload">⬇ make_shortcuts.bat 다운로드</button>
          <button class="btn" id="btnCopy">복사</button>
        </div>
        <p class="builder-note">다운받은 .bat 파일을 새 PC 바탕화면에 두고 <strong>더블클릭</strong>하면 바로가기가 전부 생성됩니다.</p>
      </div>
    </div>
  </div>

  <!-- MEMO -->
  <div id="tab-memo" class="panel" style="display:none">
    <div class="memo-layout">
      <div class="memo-sidebar">
        <button class="btn btn-primary" style="width:100%" id="btnNewMemo">+ 새 메모</button>
        <div class="memo-list" id="memoList"></div>
      </div>
      <div class="memo-editor" id="memoEditor" style="display:none">
        <input type="text" class="memo-title-input" id="memoTitle" placeholder="제목">
        <textarea class="memo-body" id="memoBody" placeholder="내용을 입력하세요..."></textarea>
        <div class="memo-editor-actions">
          <div class="memo-status" id="memoStatus"></div>
          <button class="btn btn-danger" id="btnDeleteMemo">🗑 삭제</button>
        </div>
      </div>
      <div class="memo-empty" id="memoEmpty">
        <div class="big">📝</div>
        <div>메모를 선택하거나 새로 만들어보세요</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyAvRm_Oa1uFuUox4qFkknDPZ02bb2JIhyc",
  authDomain: "backup-a621f.firebaseapp.com",
  projectId: "backup-a621f",
  storageBucket: "backup-a621f.firebasestorage.app",
  messagingSenderId: "743388895375",
  appId: "1:743388895375:web:26190def8ef2c14b6ff8fa"
});
var db = firebase.firestore();
var TS = firebase.firestore.FieldValue.serverTimestamp;

/* ── UTILS ── */
var toastTimer;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ el.classList.remove('show'); },2200);
}
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(ts){
  if(!ts) return '';
  var d=ts.toDate ? ts.toDate() : new Date(ts);
  return (d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
}
function setSyncStatus(state,msg){
  var el=document.getElementById('syncStatus');
  el.className='sync'+(state?' '+state:'');
  el.textContent=msg;
}

/* ── PASSWORD ── */
var currentPassword='1234';

function loadPassword(cb){
  db.collection('config').doc('password').get().then(function(snap){
    if(snap.exists) currentPassword=snap.data().value;
    cb();
  }).catch(function(){ cb(); });
}

function doLogin(){
  var val=document.getElementById('pwInput').value;
  loadPassword(function(){
    if(val===currentPassword){
      document.getElementById('lockScreen').style.display='none';
      document.getElementById('appMain').style.display='block';
      initApp();
    } else {
      document.getElementById('lockError').textContent='비밀번호가 틀렸습니다.';
      document.getElementById('pwInput').value='';
    }
  });
}

function doRemoveLock(){
  if(confirm('비밀번호 보호를 해제하시겠습니까?')){
    localStorage.setItem('app_unlocked','1');
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('appMain').style.display='block';
    initApp();
  }
}

function doLogout(){
  document.getElementById('appMain').style.display='none';
  document.getElementById('lockScreen').style.display='flex';
  document.getElementById('pwInput').value='';
  document.getElementById('lockError').textContent='';
}

function doOpenModal(){ document.getElementById('changePwModal').classList.add('show'); }
function doCloseModal(){
  document.getElementById('changePwModal').classList.remove('show');
  document.getElementById('pwModalError').textContent='';
}

function doChangePassword(){
  var old=document.getElementById('oldPw').value;
  var nw=document.getElementById('newPw').value;
  var nw2=document.getElementById('newPw2').value;
  var errEl=document.getElementById('pwModalError');
  if(old!==currentPassword){ errEl.textContent='현재 비밀번호가 틀렸습니다.'; return; }
  if(!nw){ errEl.textContent='새 비밀번호를 입력해주세요.'; return; }
  if(nw!==nw2){ errEl.textContent='새 비밀번호가 일치하지 않습니다.'; return; }
  db.collection('config').doc('password').set({value:nw}).then(function(){
    currentPassword=nw;
    toast('비밀번호가 변경되었습니다 ✓');
    doCloseModal();
    ['oldPw','newPw','newPw2'].forEach(function(id){ document.getElementById(id).value=''; });
  }).catch(function(e){ errEl.textContent='저장 실패: '+e.message; });
}

/* ── TABS ── */
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab===name);
  });
  document.getElementById('tab-script').style.display=name==='script'?'block':'none';
  document.getElementById('tab-memo').style.display=name==='memo'?'block':'none';
}

/* ── SCRIPT BUILDER ── */
var items=[], unsubItems=null;

function escapeBat(s){ return s.replace(/&/g,'^&').replace(/%/g,'%%'); }
function safeFileName(s){ return s.replace(/[\\/:*?"<>|]/g,'_'); }

function buildScript(){
  if(!items.length) return '@echo off\n:: 항목을 추가하면 여기에 스크립트가 표시됩니다.';
  var lines=['@echo off','chcp 65001 >nul','set DESK=%USERPROFILE%\\Desktop','echo 바탕화면 바로가기를 생성하는 중...',''];
  items.forEach(function(it){
    lines.push('set "FILE=%DESK%\\'+safeFileName(it.name)+'.url"');
    lines.push('(echo [InternetShortcut]');
    lines.push(' echo URL='+it.url+')> "%FILE%"');
    lines.push('echo  v '+escapeBat(it.name));
    lines.push('');
  });
  lines.push('echo.','echo 완료! 아무 키나 누르면 창이 닫힙니다.','pause >nul');
  return lines.join('\r\n');
}

function renderItems(){
  document.getElementById('countBadge').textContent=items.length;
  var ul=document.getElementById('itemList');
  if(!items.length){ ul.innerHTML='<div class="empty-msg">아직 항목이 없어요 :)</div>'; }
  else {
    ul.innerHTML=items.map(function(it){
      return '<li><div class="item-info"><div class="name">'+escHtml(it.name)+'</div><div class="url">'+escHtml(it.url)+'</div></div>'
            +'<button class="btn btn-danger" style="padding:6px 10px;font-size:15px" data-id="'+it._id+'">✕</button></li>';
    }).join('');
    ul.querySelectorAll('[data-id]').forEach(function(btn){
      btn.addEventListener('click',function(){ removeItem(btn.dataset.id); });
    });
  }
  document.getElementById('preview').textContent=buildScript();
}

function subscribeItems(){
  if(unsubItems) unsubItems();
  unsubItems=db.collection('shortcuts').onSnapshot(function(snap){
    items=snap.docs.map(function(d){ return Object.assign({_id:d.id},d.data()); });
    items.sort(function(a,b){ return (a.createdAt&&a.createdAt.seconds||0)-(b.createdAt&&b.createdAt.seconds||0); });
    renderItems();
    setSyncStatus('ok','🟢 Firebase 연결됨');
  }, function(err){ setSyncStatus('err','🔴 연결 오류'); });
}

function addItem(){
  var name=document.getElementById('nameInput').value.trim();
  var url=document.getElementById('urlInput').value.trim();
  if(!name||!url){ toast('이름과 URL을 모두 입력해주세요.'); return; }
  if(!/^https?:\/\//i.test(url)) url='https://'+url;
  db.collection('shortcuts').add({name:name,url:url,createdAt:TS()}).then(function(){
    document.getElementById('nameInput').value='';
    document.getElementById('urlInput').value='';
    document.getElementById('nameInput').focus();
    toast('추가되었습니다 ✓');
  }).catch(function(e){ toast('저장 실패: '+e.message); });
}

function removeItem(id){
  db.collection('shortcuts').doc(id).delete().catch(function(e){ toast('삭제 실패: '+e.message); });
}

function applyPreset(){
  var val=document.getElementById('urlPreset').value;
  if(!val) return;
  var parts=val.split('|');
  document.getElementById('nameInput').value=parts[0];
  document.getElementById('urlInput').value=parts[1];
  document.getElementById('urlPreset').value='';
  document.getElementById('nameInput').focus();
}

/* ── MEMO ── */
var memos=[], currentMemoId=null, memoSaveTimer=null, unsubMemos=null;

function renderMemoList(){
  var el=document.getElementById('memoList');
  if(!memos.length){ el.innerHTML='<div class="empty-msg" style="padding:16px 4px;font-size:12px">메모가 없어요</div>'; return; }
  var sorted=memos.slice().sort(function(a,b){ return (b.updatedAt&&b.updatedAt.seconds||0)-(a.updatedAt&&a.updatedAt.seconds||0); });
  el.innerHTML=sorted.map(function(m){
    return '<div class="memo-item'+(m._id===currentMemoId?' selected':'')+'" data-id="'+m._id+'">'
          +'<div class="m-title">'+escHtml(m.title||'제목 없음')+'</div>'
          +'<div class="m-preview">'+escHtml((m.body||'').split('\n')[0]||'내용 없음')+'</div>'
          +'<div class="m-date">'+fmtDate(m.updatedAt)+'</div></div>';
  }).join('');
  el.querySelectorAll('.memo-item').forEach(function(el){
    el.addEventListener('click',function(){ openMemo(el.dataset.id); });
  });
}

function openMemo(id){
  currentMemoId=id;
  var m=memos.find(function(x){ return x._id===id; });
  if(!m) return;
  document.getElementById('memoEditor').style.display='flex';
  document.getElementById('memoEmpty').style.display='none';
  document.getElementById('memoTitle').value=m.title||'';
  document.getElementById('memoBody').value=m.body||'';
  document.getElementById('memoStatus').textContent='';
  renderMemoList();
}

function newMemo(){
  db.collection('memos').add({title:'',body:'',createdAt:TS(),updatedAt:TS()}).then(function(ref){
    currentMemoId=ref.id;
    toast('새 메모 생성됨');
  }).catch(function(e){ toast('생성 실패: '+e.message); });
}

function deleteMemo(){
  if(!currentMemoId) return;
  db.collection('memos').doc(currentMemoId).delete().then(function(){
    currentMemoId=null;
    document.getElementById('memoEditor').style.display='none';
    document.getElementById('memoEmpty').style.display='flex';
    toast('삭제되었습니다.');
  }).catch(function(e){ toast('삭제 실패: '+e.message); });
}

function onMemoChange(){
  if(!currentMemoId) return;
  var status=document.getElementById('memoStatus');
  status.textContent='저장 중...';
  clearTimeout(memoSaveTimer);
  memoSaveTimer=setTimeout(function(){
    var title=document.getElementById('memoTitle').value;
    var body=document.getElementById('memoBody').value;
    db.collection('memos').doc(currentMemoId).update({title:title,body:body,updatedAt:TS()}).then(function(){
      status.textContent='저장됨 ✓';
      setTimeout(function(){ status.textContent=''; },1800);
    }).catch(function(){ status.textContent='저장 실패'; });
  },600);
}

function subscribeMemos(){
  if(unsubMemos) unsubMemos();
  unsubMemos=db.collection('memos').onSnapshot(function(snap){
    memos=snap.docs.map(function(d){ return Object.assign({_id:d.id},d.data()); });
    renderMemoList();
    if(currentMemoId){
      var m=memos.find(function(x){ return x._id===currentMemoId; });
      if(!m){ currentMemoId=null; document.getElementById('memoEditor').style.display='none'; document.getElementById('memoEmpty').style.display='flex'; }
    } else if(memos.length===1){
      openMemo(memos[0]._id);
    }
  },function(err){ console.error(err); });
}

/* ── INIT ── */
function initApp(){
  subscribeItems();
  subscribeMemos();
}

/* ── BIND EVENTS (DOM ready) ── */
document.addEventListener('DOMContentLoaded', function(){
  // Lock screen
  document.getElementById('btnLogin').addEventListener('click', doLogin);
  document.getElementById('btnRemoveLock').addEventListener('click', doRemoveLock);
  document.getElementById('pwInput').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

  // Header
  document.getElementById('btnLogout').addEventListener('click', doLogout);
  document.getElementById('btnOpenModal').addEventListener('click', doOpenModal);

  // Modal
  document.getElementById('btnCloseModal').addEventListener('click', doCloseModal);
  document.getElementById('btnChangePassword').addEventListener('click', doChangePassword);

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ switchTab(btn.dataset.tab); });
  });

  // Builder
  document.getElementById('urlPreset').addEventListener('change', applyPreset);
  document.getElementById('btnAddItem').addEventListener('click', addItem);
  document.getElementById('nameInput').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('urlInput').focus(); });
  document.getElementById('urlInput').addEventListener('keydown', function(e){ if(e.key==='Enter') addItem(); });
  document.getElementById('btnDownload').addEventListener('click', function(){
    if(!items.length){ toast('항목을 먼저 추가해주세요.'); return; }
    var blob=new Blob(['\uFEFF'+buildScript()],{type:'text/plain;charset=utf-8'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='make_shortcuts.bat';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('다운로드 완료!');
  });
  document.getElementById('btnCopy').addEventListener('click', function(){
    navigator.clipboard&&navigator.clipboard.writeText(buildScript()).then(function(){ toast('클립보드에 복사되었습니다 ✓'); });
  });

  // Memo
  document.getElementById('btnNewMemo').addEventListener('click', newMemo);
  document.getElementById('btnDeleteMemo').addEventListener('click', deleteMemo);
  document.getElementById('memoTitle').addEventListener('input', onMemoChange);
  document.getElementById('memoBody').addEventListener('input', onMemoChange);

  // Auto-login if previously unlocked
  if(localStorage.getItem('app_unlocked')==='1'){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('appMain').style.display='block';
    initApp();
  }
});
</script>
</body>
</html>
